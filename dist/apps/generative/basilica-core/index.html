<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BASILICA // CORE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }
    canvas { display: block; }

    #ui-overlay {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 100;
      pointer-events: none;
      user-select: none;
    }
    #ui-title {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.25);
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    #ui-stats {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .stat-row {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
    }
    .stat-row span {
      color: rgba(255,255,255,0.75);
      margin-left: 6px;
    }
    #ui-phase {
      font-size: 13px;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.55);
      margin-top: 14px;
      text-transform: uppercase;
    }
    #ui-phase span {
      color: #e8d5a0;
    }

    #ui-keyboard {
      position: fixed;
      bottom: 20px; left: 20px;
      z-index: 100;
      pointer-events: none;
    }
    .key-hint {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      line-height: 1.9;
    }
    .key-hint kbd {
      color: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.75);
      padding: 1px 4px;
      font-family: inherit;
      font-size: 8px;
    }

    #ui-event {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 200;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(232, 213, 160, 0.9);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #ui-event.visible { opacity: 1; }

    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 1s ease;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    #loading-title {
      font-size: 13px;
      letter-spacing: 0.5em;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    #loading-sub {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
    }
  </style>
  <script type="module" crossorigin src="/assets/3d-app1-D-hU6QrO.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
</head>
<body>
  <div id="loading">
    <div id="loading-title">BASILICA // CORE</div>
    <div id="loading-sub">INITIALIZING WORLD GENESIS</div>
  </div>

  <div id="canvas-container"></div>

  <div id="ui-overlay">
    <div id="ui-title">BASILICA // CORE</div>
    <div id="ui-stats">
      <div class="stat-row">SEED <span id="stat-seed">—</span></div>
      <div class="stat-row">ARCHETYPE <span id="stat-archetype">—</span></div>
      <div class="stat-row">CORE <span id="stat-core">—</span></div>
      <div class="stat-row">MUTATION <span id="stat-mutation">—</span></div>
      <div class="stat-row">ENERGY <span id="stat-energy">0</span></div>
      <div class="stat-row">MUTATIONS <span id="stat-mutations">0</span></div>
      <div class="stat-row">TICK <span id="stat-tick">0</span></div>
    </div>
    <div id="ui-phase">PHASE <span id="stat-phase">DORMANT</span></div>
  </div>

  <div id="ui-keyboard">
    <div class="key-hint"><kbd>CLICK</kbd> deposit energy</div>
    <div class="key-hint"><kbd>E</kbd> disturb core</div>
    <div class="key-hint"><kbd>P</kbd> next phase</div>
    <div class="key-hint"><kbd>C</kbd> camera mode</div>
    <div class="key-hint"><kbd>M</kbd> export metadata</div>
    <div class="key-hint"><kbd>R</kbd> reset world</div>
    <div class="key-hint"><kbd>1-2</kbd> archetype</div>
    <div class="key-hint"><kbd>Q/W/A</kbd> mutation logic</div>
  </div>

  <div id="ui-event"></div>

</body>
</html>
